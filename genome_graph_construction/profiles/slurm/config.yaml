# Snakemake SLURM Profile
# Usage: snakemake --profile profiles/slurm

# Cluster submission
cluster:
  mkdir -p logs/slurm/{rule} &&
  sbatch
    --partition={resources.partition}
    --cpus-per-task={threads}
    --mem={resources.mem_mb}
    --time={resources.time}
    --job-name=smk-{rule}-{wildcards}
    --output=logs/slurm/{rule}/%j-{rule}-{wildcards}.out
    --error=logs/slurm/{rule}/%j-{rule}-{wildcards}.err
    --parsable

cluster-status: "scripts/slurm_status.py"
cluster-cancel: "scancel"

# Default resources
default-resources:
  - partition=normal
  - mem_mb=8000
  - time="04:00:00"

# Job settings
jobs: 100
latency-wait: 60
keep-going: true
rerun-incomplete: true
printshellcmds: true

# Limit simultaneous jobs for heavy rules
set-resources:
  - cactus_pangenome:partition=highmem
  - cactus_pangenome:time=72:00:00
  - build_giraffe_indexes:partition=highmem
  - build_giraffe_indexes:time=24:00:00
  - merge_manta_sv:time=12:00:00
  - augment_graph_with_sv:time=12:00:00

# Local rules (don't submit to cluster)
local-cores: 4
